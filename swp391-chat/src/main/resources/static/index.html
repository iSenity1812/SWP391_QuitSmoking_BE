<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>SWP391 Chat Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .chat-container {
            max-width: 700px;
            margin: 35px auto;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            background: #f8f9fa;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .message {
            padding: 10px 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .message-sender {
            background-color: #007bff;
            color: white;
            margin-left: auto;
        }

        .message-receiver {
            background-color: #e9ecef;
            color: #212529;
        }

        .username {
            font-weight: bold;
            font-size: 0.8em;
            margin-bottom: 3px;
        }

        .timestamp {
            font-size: 0.7em;
            color: #6c757d;
            text-align: right;
            margin-top: 3px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="chat-container">
            <h2 class="text-center mb-4">SWP391 Chat Test</h2>

            <div class="mb-3">
                <label for="sender" class="form-label">ID của bạn:</label>
                <input type="text" class="form-control" id="sender" placeholder="Nhập UUID của người gửi">
            </div>

            <div class="mb-3">
                <label for="senderName" class="form-label">Tên của bạn:</label>
                <input type="text" class="form-control" id="senderName" placeholder="Nhập tên của người gửi">
            </div>

            <div class="mb-3">
                <label for="receiver" class="form-label">ID người nhận:</label>
                <input type="text" class="form-control" id="receiver" placeholder="Nhập UUID của người nhận">
            </div>

            <div class="mb-3">
                <label for="receiverName" class="form-label">Tên người nhận:</label>
                <input type="text" class="form-control" id="receiverName" placeholder="Nhập tên của người nhận">
            </div>

            <button id="connect" class="btn btn-primary mb-3">Kết nối</button>
            <button id="disconnect" class="btn btn-danger mb-3" disabled>Ngắt kết nối</button>

            <div class="chat-messages" id="messages"></div>

            <div class="input-group mb-3">
                <input type="text" id="message" class="form-control" placeholder="Nhập tin nhắn..." disabled>
                <button class="btn btn-primary" type="button" id="send" disabled>Gửi</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script>
        let stompClient = null;
        const connectButton = document.getElementById('connect');
        const disconnectButton = document.getElementById('disconnect');
        const sendButton = document.getElementById('send');
        const messageInput = document.getElementById('message');
        const messagesContainer = document.getElementById('messages');

        function connect() {
            const sender = document.getElementById('sender').value;
            const senderName = document.getElementById('senderName').value;

            if (!sender || !senderName) {
                alert("Vui lòng nhập ID và tên của bạn!");
                return;
            }

            // Tạo kết nối WebSocket
            const socket = new SockJS('/api/ws');
            stompClient = Stomp.over(socket);

            stompClient.connect({}, function (frame) {
                console.log('Đã kết nối: ' + frame);

                // Đăng ký nhận tin nhắn cá nhân
                stompClient.subscribe('/user/' + sender + '/queue/messages', function (message) {
                    const received = JSON.parse(message.body);
                    addMessage(received, false);
                });

                // Đăng ký nhận thông báo công khai
                stompClient.subscribe('/topic/public', function (message) {
                    console.log('Thông báo công khai: ', JSON.parse(message.body));
                });

                // Tham gia cuộc trò chuyện
                stompClient.send("/app/chat.addUser", {},
                    JSON.stringify({
                        senderId: sender,
                        senderUsername: senderName,
                        messageType: 'JOIN'
                    })
                );

                // Cập nhật UI
                connectButton.disabled = true;
                disconnectButton.disabled = false;
                messageInput.disabled = false;
                sendButton.disabled = false;

                addSystemMessage("Đã kết nối thành công!");
            }, function (error) {
                console.error('Lỗi kết nối: ', error);
                addSystemMessage("Lỗi kết nối: " + error);
            });
        }

        function disconnect() {
            if (stompClient !== null) {
                stompClient.disconnect();
                stompClient = null;

                // Cập nhật UI
                connectButton.disabled = false;
                disconnectButton.disabled = true;
                messageInput.disabled = true;
                sendButton.disabled = true;

                addSystemMessage("Đã ngắt kết nối.");
            }
        }

        function sendMessage() {
            const sender = document.getElementById('sender').value;
            const senderName = document.getElementById('senderName').value;
            const receiver = document.getElementById('receiver').value;
            const receiverName = document.getElementById('receiverName').value;
            const content = messageInput.value;

            if (!content || !receiver || !receiverName) {
                alert("Vui lòng nhập đầy đủ thông tin!");
                return;
            }

            const chatMessage = {
                senderId: sender,
                receiverId: receiver,
                senderUsername: senderName,
                receiverUsername: receiverName,
                content: content,
                messageType: 'MESSAGE'
            };

            stompClient.send("/app/chat.sendMessage", {}, JSON.stringify(chatMessage));
            addMessage(chatMessage, true);
            messageInput.value = '';
        }

        function addMessage(message, isSender) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message');
            messageElement.classList.add(isSender ? 'message-sender' : 'message-receiver');

            const username = document.createElement('div');
            username.classList.add('username');
            username.textContent = isSender ? message.senderUsername : message.senderUsername;

            const content = document.createElement('div');
            content.textContent = message.content;

            const timestamp = document.createElement('div');
            timestamp.classList.add('timestamp');
            timestamp.textContent = new Date().toLocaleTimeString();

            messageElement.appendChild(username);
            messageElement.appendChild(content);
            messageElement.appendChild(timestamp);

            messagesContainer.appendChild(messageElement);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addSystemMessage(text) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('alert');
            messageElement.classList.add('alert-info');
            messageElement.classList.add('text-center');
            messageElement.textContent = text;

            messagesContainer.appendChild(messageElement);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Gán sự kiện cho các nút
        connectButton.addEventListener('click', connect);
        disconnectButton.addEventListener('click', disconnect);
        sendButton.addEventListener('click', sendMessage);

        // Cho phép nhấn Enter để gửi tin nhắn
        messageInput.addEventListener('keyup', function (event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>

</html>
