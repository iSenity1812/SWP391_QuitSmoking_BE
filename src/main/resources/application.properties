spring.application.name=SWP391_QuitSmoking_BE
spring.main.allow-circular-references=true

# Database Configuration - Using H2 for development
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# JWT Configuration
application.security.jwt.secret-key=4bb6d1dfbafb64a681139d1586b6f1160d18159afd57c8c79136d7490630407c
application.security.jwt.expiration=3600000
application.security.jwt.refresh-token.expiration=604800000

# Logging Configuration
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG
logging.level.org.hibernate.engine.transaction=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.level.java.sql=DEBUG
logging.level.org.hibernate.engine.jdbc=TRACE

# Email Configuration (disabled for development)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
# Email credentials - set these as environment variables in production
spring.mail.username=${MAIL_USERNAME:your_gmail@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}

# Thymeleaf Configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.mail.default-encoding=UTF-8
spring.main.allow-bean-definition-overriding=true

# Redis Configuration (disabled for development)
# spring.data.redis.host=localhost
# spring.data.redis.port=6379

# VNPay Configuration (sandbox)
vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.tmn-code=${VNPAY_TMN_CODE:ZA6FG78P}
vnpay.hash-secret=${VNPAY_HASH_SECRET:1ZFWTSA2162SUAZ1YDS7CTJGIFVV44HS}
vnpay.api-url=https://sandbox.vnpayment.vn/merchant_webapi/api/transaction
