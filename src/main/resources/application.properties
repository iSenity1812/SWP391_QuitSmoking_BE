spring.application.name=SWP391_QuitSmoking_BE
spring.main.allow-circular-references=true

spring.datasource.url=jdbc:postgresql://localhost:5432/QuitSmokingDB
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# File: src/main/resources/application.properties
app.environment=development
app.base-url.development=http://localhost:8080
app.base-url.staging=https://staging-api.yourapp.com
app.base-url.production=https://api.yourapp.com

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


