# Demo Profile with H2 In-Memory Database
spring.application.name=SWP391_QuitSmoking_BE
spring.main.allow-circular-references=true

# H2 In-Memory Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console (for debugging - access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration for H2
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Disable circular references warning for demo
spring.mail.allow-cicular-references=true

# JWT Configuration
application.security.jwt.secret-key=4bb6d1dfbafb64a681139d1586b6f1160d18159afd57c8c79136d7490630407c
application.security.jwt.expiration=3600000
application.security.jwt.refresh-token.expiration=604800000

# Logging Configuration
logging.level.com.swp391project.SWP391_QuitSmoking_BE=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# Email Configuration (Mock for demo)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=demo@example.com
spring.mail.password=demo-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Thymeleaf Configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.mail.default-encoding=UTF-8

# VNPay Configuration (SANDBOX)
vnpay.tmn-code=2QXUI4J4
vnpay.hash-secret=KNCSMSHUXNKMWVZQKQZRSIRBQVHXUTBT
vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.api-url=https://sandbox.vnpayment.vn/merchant_webapi/api/transaction
vnpay.return-url=http://localhost:3000/payment/return
vnpay.version=2.1.0
