# Production Environment Configuration
spring.profiles.active=prod

# Database Configuration (Use environment variables)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# VNPay Configuration (Production - Use environment variables)
vnpay.tmn-code=${VNPAY_TMN_CODE}
vnpay.hash-secret=${VNPAY_HASH_SECRET}
vnpay.pay-url=https://vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=${APP_BASE_URL}/api/payment/vnpay/callback
vnpay.timeout-minutes=15
vnpay.max-amount=50000000
vnpay.min-amount=10000

# VNPay Security Configuration (Production)
vnpay.security.ip-whitelist=113.160.92.202,118.107.79.174,203.171.21.94
vnpay.security.rate-limit.max-requests=10
vnpay.security.enable-ip-validation=true

# Application Configuration
app.environment=production
app.base-url.production=${APP_BASE_URL}

# Logging Configuration
logging.level.com.swp391project.SWP391_QuitSmoking_BE.service.VnPayService=INFO
logging.level.com.swp391project.SWP391_QuitSmoking_BE.service.PaymentService=INFO
logging.level.com.swp391project.SWP391_QuitSmoking_BE.controller.PaymentController=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Security
server.error.include-stacktrace=never
server.error.include-message=never

# Retry Configuration
spring.retry.enabled=true
