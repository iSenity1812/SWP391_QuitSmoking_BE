<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chúc mừng thành tựu mới!</title>
</head>
<body style="font-family: Arial, sans-serif; background: #f6f8fa; padding: 24px;">
    <div style="max-width: 500px; margin: auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 8px #eee; padding: 32px;">
        <h2 style="color: #16a34a;">🎉 Chúc mừng, <span th:text="${username}"></span>!</h2>
        <p>Bạn vừa đạt được thành tựu:</p>
        <div style="background: #e0f7fa; border-radius: 8px; padding: 16px; margin: 16px 0;">
            <h3 style="color: #0288d1;" th:text="${achievementName}"></h3>
            <p th:text="${achievementDescription}"></p>
        </div>
        <p>Hãy tiếp tục cố gắng nhé! 💪</p>
        <a href="https://yourapp.com/profile" style="display: inline-block; background: #16a34a; color: #fff; padding: 10px 20px; border-radius: 6px; text-decoration: none;">Xem thành tựu của bạn</a>
        <p style="margin-top: 32px; color: #888;">Cảm ơn bạn đã đồng hành cùng QuitSmoking!</p>
    </div>
</body>
</html>
