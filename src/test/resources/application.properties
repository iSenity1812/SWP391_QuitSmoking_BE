# VNPAY Sandbox Configuration
vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.tmn-code=ZA6FG78P
vnpay.hash-secret=1ZFWTSA2162SUAZ1YDS7CTJGIFVV44HS
vnpay.return-url=http://localhost:8080/api/payment/vnpay/return
spring.main.allow-bean-definition-overriding=true

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# JWT Secret Key for testing
application.security.jwt.secret-key=test-secret-key

# JWT Expiration for testing
application.security.jwt.expiration=3600000

# JWT Refresh Token Expiration for testing
application.security.jwt.refresh-token.expiration=604800000

# Application environment for test
app.environment=test

# Base URL for test environment
app.base-url.development=http://localhost:8080

# Base URL for staging environment
app.base-url.staging=http://localhost:8080

# Base URL for production environment
app.base-url.production=http://localhost:8080

# Ensure schema is dropped and created on startup for H2
spring.jpa.hibernate.ddl-auto=create-drop 