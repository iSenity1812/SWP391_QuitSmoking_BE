# Test Database configuration (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate configuration for test
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable mail for tests
spring.mail.host=
spring.mail.port=
spring.mail.username=
spring.mail.password=

# VnPay TEST configuration (using real sandbox URLs for testing)
vnpay.tmn-code=2QXUI4J4
vnpay.hash-secret=KNCSMSHUXNKMWVZQKQZRSIRBQVHXUTBT
vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=http://localhost:3000/payment/return
vnpay.version=2.1.0
vnpay.command=pay
vnpay.order-type=billpayment
vnpay.timeout-minutes=15
vnpay.max-amount=50000000
